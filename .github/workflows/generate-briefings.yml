name: Generate AI Briefings

on:
  schedule:
    - cron: "0 6 * * 1"   # weekly, Mondays 06:00 UTC
  workflow_dispatch: {}    # lets you click "Run workflow" manually any time

permissions:
  contents: write   # needed so the job can commit data/briefings.json back to the repo

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate briefings
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_briefings.py

      - name: Commit updated briefings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/briefings.json
          git diff --staged --quiet || git commit -m "Auto-update AI briefings ($(date -u +'%Y-%m-%d'))"
          git push
